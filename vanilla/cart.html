<!DOCTYPE html>
<html lang="ko">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 - MALL</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
 </head>
 <body>
  <app-header></app-header>
<!-- 장바구니 페이지 (figma-make CartPage 구조) -->
  <main class="cart-page">
   <div class="container page-content">
    <!-- 빈 장바구니 상태 -->
    <div id="cartEmpty" class="cart-empty" style="display: none">
     <div class="cart-empty-icon">
      <svg
       xmlns="http://www.w3.org/2000/svg"
       width="40"
       height="40"
       viewBox="0 0 24 24"
       fill="none"
       stroke="currentColor"
       stroke-width="2"
      >
       <polyline points="3 6 5 6 21 6" />
       <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
      </svg>
     </div>
     <h2>장바구니가 비어있습니다</h2>
     <p>원하는 상품을 장바구니에 담아보세요.</p>
     <a href="products.html" class="btn btn-primary btn-lg">쇼핑하러 가기</a>
    </div>

    <!-- 장바구니 아이템 목록 -->
    <div id="cartContent" class="cart-content" style="display: none">
     <h1 class="cart-title">장바구니</h1>

     <div class="cart-layout">
      <div class="cart-items">
       <div class="cart-items-header">
        <span id="cartItemCount">전체 0개</span>
        <button type="button" id="clearCartBtn" class="link-btn">전체 삭제</button>
       </div>
       <ul id="cartList" class="cart-list">
        <!-- cart.js에서 동적으로 추가됨 -->
       </ul>
      </div>

      <!-- 주문 요약 -->
      <div class="cart-summary">
       <div class="cart-summary-box">
        <h3>주문 예정 금액</h3>
        <div class="cart-summary-row">
         <span>상품 합계</span>
         <span id="subtotal">0원</span>
        </div>
        <div class="cart-summary-row">
         <span>배송비</span>
         <span id="shippingFee">0원</span>
        </div>
        <p id="freeShippingMsg" class="free-shipping-msg" style="display: none"></p>
        <div class="cart-summary-total">
         <span>총 주문 금액</span>
         <span id="cartTotal">0원</span>
        </div>
        <a href="#" id="orderBtn" class="btn btn-primary btn-lg btn-full">주문하기</a>
        <div class="cart-summary-link">
         <a href="products.html">쇼핑 계속하기 →</a>
        </div>
       </div>
      </div>
     </div>
    </div>
   </div>
  </main>
  <app-footer></app-footer>
<script type="module" src="js/app.js" data-page="cart"></script>
 </body>
</html>
