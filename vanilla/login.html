<!DOCTYPE html>
<html lang="ko">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - MALL</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
 </head>
 <body>
  <app-header></app-header>
<main class="auth-page">
   <div class="auth-card">
    <div class="auth-header">
     <h1>MALL</h1>
     <h2>로그인</h2>
    </div>

    <form id="loginForm" class="auth-form">
     <div class="form-group">
      <label>이메일</label>
      <input type="email" id="email" class="form-input" placeholder="example@email.com" required />
      <p class="form-helper" id="emailError"></p>
     </div>
     <div class="form-group">
      <label>비밀번호</label>
      <input
       type="password"
       id="password"
       class="form-input"
       placeholder="비밀번호 입력"
       required
      />
      <p class="form-helper" id="passwordError"></p>
     </div>
     <div class="auth-options">
      <label class="auth-checkbox"><input type="checkbox" /> <span>자동 로그인</span></label>
      <a href="coming-soon.html?from=login" class="auth-link">비밀번호 찾기</a>
     </div>
     <button type="submit" class="btn btn-primary btn-lg btn-full" id="loginBtn">로그인</button>
    </form>

    <p class="auth-footer">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
   </div>
  </main>

  <div id="messageModal" class="modal-backdrop" style="display: none">
   <div class="modal-content">
    <button type="button" class="modal-close" id="modalClose">
     <svg
      xmlns="http://www.w3.org/2000/svg"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
     >
      <path d="M18 6 6 18" />
      <path d="m6 6 12 12" />
     </svg>
    </button>
    <div class="modal-icon success">✓</div>
    <h3 class="modal-title">로그인 성공</h3>
    <p class="modal-desc">환영합니다! 즐거운 쇼핑 되세요.</p>
    <button type="button" class="btn btn-primary btn-lg btn-full" id="modalConfirm">확인</button>
   </div>
  </div>
  <app-footer></app-footer>
<script type="module" src="js/app.js" data-page="login"></script>
 </body>
</html>
