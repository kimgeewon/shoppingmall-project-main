<!DOCTYPE html>
<html lang="ko">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 완료 - MALL</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
 </head>
 <body>
  <app-header></app-header>
<main class="order-complete-page">
   <div class="container" style="padding: 5rem 1rem; max-width: 32rem; margin: 0 auto">
    <div class="order-complete-icon">✓</div>
    <h1>주문이 완료되었습니다!</h1>
    <p class="order-complete-desc">
     주문해주셔서 감사합니다.<br />상품 배송은 2-3일 내로 시작될 예정입니다.
    </p>

    <div class="order-complete-info">
     <div class="order-complete-row">
      <span>주문번호</span>
      <span id="orderNumber" class="order-number">-</span>
     </div>
     <div class="order-complete-row">
      <span>결제금액</span>
      <span id="orderTotal" class="order-total">58,000원</span>
     </div>
     <div class="order-complete-row">
      <span>배송지</span>
      <span id="orderAddress" class="order-address">서울시 강남구 테헤란로 123...</span>
     </div>
    </div>

    <div class="order-complete-buttons">
     <a href="order-history.html" class="btn btn-outline btn-lg btn-full">📋 주문 내역 보기</a>
     <a href="index.html" class="btn btn-primary btn-lg btn-full">🛍 쇼핑 계속하기</a>
    </div>
   </div>
  </main>
  <app-footer></app-footer>
<script type="module" src="js/app.js" data-page="order-complete"></script>
 </body>
</html>
